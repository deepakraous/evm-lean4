<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVM Simulator Web UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Lean EVM Simulator</h1>
    <p>Enter instructions and inspect the stack, memory, and storage.</p>
    <div class="panel">
      <label for="command-input">Command</label>
      <input id="command-input" type="text" placeholder="push 5" />
      <div class="button-row">
        <button id="run-btn">Run</button>
        <button id="dump-btn">Dump State</button>
        <button id="reset-btn">Reset</button>
      </div>
    </div>
    <div class="output-panel">
      <div class="output-block">
        <h2>Output</h2>
        <pre id="output" aria-live="polite"></pre>
      </div>
      <div class="output-block">
        <h2>State</h2>
        <pre id="state" aria-live="polite"></pre>
      </div>
    </div>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
