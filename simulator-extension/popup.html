<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EVM Simulator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="popup">
    <header>
      <h1>EVM Simulator</h1>
      <p>Secure Chrome extension simulator</p>
    </header>
    <main>
      <label for="command">Command</label>
      <input id="command" type="text" placeholder="push 5" aria-label="EVM command" />
      <div class="buttons">
        <button id="run">Run</button>
        <button id="dump">Dump</button>
        <button id="reset">Reset</button>
      </div>
      <section>
        <h2>Output</h2>
        <pre id="output"></pre>
      </section>
      <section>
        <h2>State</h2>
        <pre id="state"></pre>
      </section>
    </main>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
